name: Deploy ECS Fargate

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "024284060206"
  ECS_CLUSTER: tienda-perritos-cluster
  ECS_SERVICE: tienda-perritos-service
  TASK_DEFINITION: .aws/task-definition.json
  FRONTEND_REPOSITORY: tienda-frontend
  BACKEND_REPOSITORY: tienda-backend
  DB_REPOSITORY: tienda-db

jobs:
  deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        run: |
          REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

          docker build -t $REGISTRY/$FRONTEND_REPOSITORY:$GITHUB_SHA ./frontend
          docker build -t $REGISTRY/$BACKEND_REPOSITORY:$GITHUB_SHA ./backend
          docker build -t $REGISTRY/$DB_REPOSITORY:$GITHUB_SHA ./db

          docker push $REGISTRY/$FRONTEND_REPOSITORY:$GITHUB_SHA
          docker push $REGISTRY/$BACKEND_REPOSITORY:$GITHUB_SHA
          docker push $REGISTRY/$DB_REPOSITORY:$GITHUB_SHA

      - name: Render frontend image in task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name: frontend
          image: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_REPOSITORY }}:${{ github.sha }}

      - name: Render backend image in task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          container-name: backend
          image: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_REPOSITORY }}:${{ github.sha }}

      - name: Render database image in task definition
        id: render-db
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          container-name: db
          image: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.DB_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-db.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
